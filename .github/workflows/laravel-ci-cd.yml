name: Laravel CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest
    env:
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif
        coverage: none


    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Get Composer Cache Directory
      id: composer-cache
      run: |
        echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache Composer Dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --prefer-dist --no-progress

    - name: Generate Application Key
      run: php artisan key:generate

    - name: Create SQLite Database File
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Run Database Migrations
      run: php artisan migrate --force

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache


    - name: Run Tests
      run: php artisan test

  deploy:
    needs: laravel-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    # ─── Cek apakah SSH secrets sudah dikonfigurasi ───────────────────────────
    - name: Check Deployment Configuration
      id: check-secrets
      run: |
        if [ -z "${{ secrets.SSH_HOST }}" ] && [ -z "${{ secrets.DEPLOY_WEBHOOK_URL }}" ]; then
          echo "configured=false" >> $GITHUB_OUTPUT
          echo "::warning::⚠️  Deployment SKIPPED: Belum ada server yang dikonfigurasi."
          echo "::warning::   Untuk VPS: Tambahkan secret SSH_HOST, SSH_USERNAME, SSH_KEY"
          echo "::warning::   Untuk Shared Hosting: Tambahkan secret DEPLOY_WEBHOOK_URL, DEPLOY_TOKEN"
        else
          echo "configured=true" >> $GITHUB_OUTPUT
        fi

    # ─── OPSI 1: SSH Deployment untuk VPS ─────────────────────────────────────
    # Aktifkan dengan menambahkan GitHub Secrets: SSH_HOST, SSH_USERNAME, SSH_KEY
    # SSH_PORT opsional (default: 22)
    - name: Deploy to VPS via SSH
      if: steps.check-secrets.outputs.configured == 'true' && secrets.SSH_HOST != ''
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        script: |
          cd /var/www/pergantiandosen
          bash deploy.sh

    # ─── OPSI 2: Webhook Deployment untuk Shared Hosting / cPanel ─────────────
    # Aktifkan dengan menambahkan GitHub Secrets: DEPLOY_WEBHOOK_URL, DEPLOY_TOKEN
    # - name: Trigger Webhook Deployment
    #   if: steps.check-secrets.outputs.configured == 'true' && secrets.DEPLOY_WEBHOOK_URL != ''
    #   run: |
    #     curl -X POST \
    #       -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
    #       -H "Content-Type: application/json" \
    #       --fail \
    #       ${{ secrets.DEPLOY_WEBHOOK_URL }}

    # ─── Info jika deployment belum dikonfigurasi ──────────────────────────────
    - name: Deployment Not Configured (Info)
      if: steps.check-secrets.outputs.configured == 'false'
      run: |
        echo "=========================================="
        echo "  ✅ CI (Build & Test) BERHASIL!"
        echo "  ℹ️  Deployment belum dikonfigurasi."
        echo ""
        echo "  Pilih salah satu cara deploy:"
        echo "  A) VPS/SSH → Tambahkan secret:"
        echo "     - SSH_HOST     : IP address server"
        echo "     - SSH_USERNAME : username login"
        echo "     - SSH_KEY      : private key SSH"
        echo "     - SSH_PORT     : (opsional, default 22)"
        echo ""
        echo "  B) Shared Hosting → Tambahkan secret:"
        echo "     - DEPLOY_WEBHOOK_URL : URL endpoint webhook"
        echo "     - DEPLOY_TOKEN       : token rahasia"
        echo "=========================================="

